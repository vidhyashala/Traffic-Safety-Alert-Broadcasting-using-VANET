[General]
network = trafficsafety.TrafficSafetyScenario
sim-time-limit = 500s
cmdenv-express-mode = false
cmdenv-autoflush = true

*.manager.updateInterval = 0.1s
*.manager.moduleType = "org.car2x.veins.nodes.Car"
*.manager.moduleName = "node"
*.manager.host = "localhost"
*.manager.port = 9999
*.manager.autoShutdown = true
*.manager.launchConfig = xmldoc("../../sumo/traffic_safety.launchd.xml")

*.node[*].applType = "veins::TraCIDemo11pSafety"
*.node[*].appl.headerLength = 80 bit
*.node[*].appl.dataLength = 256 bit
*.node[*].appl.beaconInterval = 1s
*.node[*].appl.defaultTtl = 5
*.node[*].appl.rebroadcastDelayMin = 0.01s
*.node[*].appl.rebroadcastDelayMax = 0.08s

*.connectionManager.sendDirect = true
*.connectionManager.maxInterfDist = 350m
*.**.nic.mac1609_4.useServiceChannel = false
*.**.nic.phy80211p.sensitivity = -89dBm
*.**.nic.phy80211p.txPower = 20mW
*.**.nic.phy80211p.bitrate = 6Mbps
